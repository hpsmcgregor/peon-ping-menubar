# Peon-Ping menu groupings
# ------------------------------------------------------------------
# Maps a pack id (or a glob pattern) to the group it appears under in
# the menu-bar "Sound Pack" submenu.
#
# Format:   <pattern> = <Group label>
#   - <pattern> is a pack id (e.g. "peon") or a shell glob (e.g. "tf2_*").
#   - First matching line wins, so list specific ids before broad globs.
#   - The order groups first appear here is the order they show in the menu.
#   - Any pack that matches nothing falls under "Other" (shown last).
#   - Lines starting with # and blank lines are ignored.
#
# Edit freely: add your own packs/patterns, reorder, or rename groups.
# If this file is missing, packs are listed flat (no groups).
# ------------------------------------------------------------------

